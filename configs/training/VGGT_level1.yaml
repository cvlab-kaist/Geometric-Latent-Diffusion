# VGGT MVDiffusion training config for level 1
# Uses VGGT encoder (aggregator block pair 11)
# Image size: 518x518, Patch size: 14, Latent size: 37x37

stage_1:
  target: stage1.rae_vggt.RAE_VGGT
  params:
    encoder_pretrained_path: 'facebook/VGGT-1B'
    encoder_input_size: 518  # VGGT standard input size
    encoder_type: 'VGGTEncoder'
    noise_tau: 0.0
    reshape_to_2d: true
    normalization_stat_path: 'model_stats/vggt/normalization_stats_level1.pt'
    special_stat_path: 'model_stats/vggt/special_stats_level1.pt'
    num_special_tokens: 5
    mae_weight: null  # No MAE decoder — depth only

stage_2:
  target: stage2.models.DDT.DiTwDDTHead
  params:
    patch_size: 1
    in_channels: 2048  # VGGT feature dimension (2 × 1024)
    hidden_size: [768, 2048]
    depth: [28, 6]
    num_heads: [16, 16]
    mlp_ratio: 4.0
    use_qknorm: false
    use_swiglu: true
    use_rope: false
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: false
    use_prope: true
    architecture_mode: "new"
    cfg_mode: "new"
    cam_input_size: 504
    cam_patch_size: 14
    level: 1
    predict_cls: false
    is_concat_mode: true
    num_special_tokens: 5

transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'uniform'

sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

training:
  camera_drop: 0.1
  global_seed: 0
  epochs: 1000000
  global_batch_size: 8  # Reduced from 16 due to VGGT memory requirements
  grad_accum_steps: 2    # Effective batch size = 16
  ema_decay: 0.9995
  num_workers: 4
  log_every: 1
  base_lr: 5e-5
  final_lr: 5e-5
  beta: [0.9, 0.95]
  wd: 0.0
  schedule_type: 'constant'
  clip_grad: 1.0

validation:
  val_num_batches: 55
  batch_size: 1
  validation_mode: 'propagation'
  ckpt_every: 5000
  sample_every: 5000
  num_views: 8
  cond_num: 4
  test_baseline: 25
  min_interval: 1
  max_interval: 25
  seed: 42
  guidance:
    method: 'cfg'
    scale: 1.5
    t_min: 0.0
    t_max: 1.0

# =============================================================================
# UNIFIED DATASET CONFIGURATION
# =============================================================================
dataset:
  name: cut3r_combined

  skip_bad_poses: true
  max_translation_norm: 100
  max_pose_retries: 200
  log_bad_pose_every: 100

  equal_ratio: false
  mix_ratio:
    hypersim: 20000
    dl3dv: 50000
    re10k: 30000

  # CUT3R combined dataset paths (Training)
  dl3dv_root: ./data/DL3DV-10K
  hypersim_root: ./data/hypersim_preprocessed
  re10k_root: ./data/re10k/processed/train

  # CUT3R combined dataset paths (Validation)
  val_dl3dv_root: ./data/DL3DV-Evaluation
  val_re10k_root: ./data/re10k/processed/test

  # Resolution (multi-resolution supported)
  image_size: [[504, 504], [504, 378], [504, 336], [504, 280]]

  # Multiview settings
  num_views: 8
  cond_num: "1-4"
  ref_view_sampling: random
  normalize_pose: true
  camera_mode: plucker

misc:
